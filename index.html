<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças Flow - Analise & Privacidade </title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
   
    <link rel="icon" type="image/png" sizes="192x192" href="https://scontent-gru2-1.xx.fbcdn.net/v/t1.15752-9/518348345_1044251757914220_7900990826548113187_n.jpg?_nc_cat=111&ccb=1-7&_nc_sid=9f807c&_nc_ohc=3Y_ccu8ZOQ0Q7kNvwFdHL9s&_nc_oc=Adrs5MoxZnZogLwpoQDGLN5zl2ndhNiY3Gb6yzXWkZNNotqHaUdFql469aN60HR3Lbs&_nc_zt=23&_nc_ht=scontent-gru2-1.xx&_nc_ss=7a32e&oh=03_Q7cD4wF9m2Ymr1_TTK992d1OlG-TFuYuP5yNbFNa14PG58QiCg&oe=69EA190B">

<link rel="apple-touch-icon" href="https://scontent-gru2-1.xx.fbcdn.net/v/t1.15752-9/518348345_1044251757914220_7900990826548113187_n.jpg?_nc_cat=111&ccb=1-7&_nc_sid=9f807c&_nc_ohc=3Y_ccu8ZOQ0Q7kNvwFdHL9s&_nc_oc=Adrs5MoxZnZogLwpoQDGLN5zl2ndhNiY3Gb6yzXWkZNNotqHaUdFql469aN60HR3Lbs&_nc_zt=23&_nc_ht=scontent-gru2-1.xx&_nc_ss=7a32e&oh=03_Q7cD4wF9m2Ymr1_TTK992d1OlG-TFuYuP5yNbFNa14PG58QiCg&oe=69EA190B">

<link rel="manifest" href="manifest.json">
    <style>
        :root { 
            --bg: #f8fafc; --card: #1e293b; --accent: #6366f1; 
            --green: #10b981; --red: #f43f5e; --text: #334155;
            --container-bg: #ffffff; --input-bg: #ffffff;
        }

        body.dark {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
            --container-bg: #1e293b; --input-bg: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; transition: 0.3s; }
        
        .app { width: 100%; max-width: 450px; padding-bottom: 100px; }

        .header-actions { width: 100%; display: flex; justify-content: flex-end; margin-bottom: 10px; gap: 8px; }
        .theme-toggle { background: var(--card); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; }

        .wallet-card { 
            background: var(--card); color: white; padding: 25px; 
            border-radius: 28px; margin-bottom: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }
        .wallet-header { display: flex; justify-content: space-between; align-items: center; opacity: 0.7; font-size: 0.8rem; }
        .balance { font-size: 2.4rem; font-weight: 800; transition: 0.3s; }
        
        /* Efeito de desfoque para privacidade */
        .blur-text { filter: blur(6px); pointer-events: none; user-select: none; }

        .btn-open-modal {
            width: 100%; padding: 14px; background: var(--accent);
            border: none; border-radius: 15px;
            color: white; font-weight: bold; cursor: pointer; transition: 0.3s;
            margin-bottom: 20px; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }

        .chart-container { background: var(--container-bg); border-radius: 24px; padding: 20px; margin-bottom: 20px; height: 240px; transition: 0.3s; }

        .month-wrapper { 
            display: flex; align-items: center; gap: 10px; margin-bottom: 20px; 
            background: #e2e8f0; padding: 5px; border-radius: 15px;
        }
        body.dark .month-wrapper { background: #334155; }
        .month-nav { display: flex; overflow-x: auto; gap: 8px; scrollbar-width: none; flex: 1; scroll-behavior: smooth; }
        .nav-btn { background: white; border: none; width: 30px; height: 30px; border-radius: 10px; cursor: pointer; color: var(--accent); }
        .chip { padding: 10px 18px; border-radius: 12px; cursor: pointer; white-space: nowrap; font-size: 0.75rem; font-weight: 700; color: #64748b; }
        .chip.active { background: var(--accent); color: white; }

        .list-container { background: var(--container-bg); border-radius: 24px; padding: 20px; transition: 0.3s; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .btn-del { border: none; background: #fee2e2; color: var(--red); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: flex-end; z-index: 1000; }
        .modal.open { display: flex; }
        .modal-content { background: var(--container-bg); width: 100%; padding: 30px; border-radius: 30px 30px 0 0; max-width: 500px; margin: 0 auto; }

        .type-selector { display: grid; grid-template-columns: 1fr 1fr; background: #f1f5f9; padding: 4px; border-radius: 12px; margin-bottom: 15px; }
        body.dark .type-selector { background: #0f172a; }
        .type-btn { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; color: #64748b; background: transparent; }
        .type-btn.active.plus { background: var(--green); color: white; }
        .type-btn.active.minus { background: var(--red); color: white; }

        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 1rem; background: var(--input-bg); color: var(--text); }
        .btn-save { background: var(--accent); color: white; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="app">
        <div class="header-actions">
            <button class="theme-toggle" style="background:#8b5cf6" onclick="document.getElementById('file-input').click()">📥 Importar</button>
            <input type="file" id="file-input" style="display:none" accept=".json" onchange="importJSON(event)">
            <button class="theme-toggle" onclick="toggleTheme()">🌓 Tema</button>
        </div>

        <header class="wallet-card">
            <div class="wallet-header"><span>RESUMO FINANCEIRO</span><span id="label-date">...</span></div>
            
            <div style="display: flex; align-items: center; justify-content: space-between; margin: 10px 0 20px 0;">
                <span class="balance" id="balance">0,00 R$</span>
                <button onclick="togglePrivacy()" style="background: none; border: none; cursor: pointer; font-size: 1.4rem; color: rgba(255,255,255,0.6);">
                    <span id="eye-icon">👁️</span>
                </button>
            </div>

            <button class="btn-open-modal" onclick="toggleModal(true)">+ NOVA TRANSAÇÃO</button>
            
            <div class="stats-grid">
                <div>
                    <small style="opacity:0.7">Ganhos</small>
                    <p id="t-in" style="color:var(--green); font-weight:bold">0,00 R$</p>
                </div>
                <div>
                    <small style="opacity:0.7">Gastos</small>
                    <p id="t-out" style="color:#fda4af; font-weight:bold">0,00 R$</p>
                </div>
            </div>
        </header>

        <div class="chart-container">
            <canvas id="financeChart"></canvas>
        </div>

        <div class="month-wrapper">
            <button class="nav-btn" onclick="scrollMonths(-100)">‹</button>
            <div class="month-nav" id="month-chips"></div>
            <button class="nav-btn" onclick="scrollMonths(100)">›</button>
        </div>

        <div class="list-container" id="transaction-list"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom:20px">O que aconteceu?</h3>
            <div class="type-selector">
                <button type="button" id="type-plus" class="type-btn active plus" onclick="setType('plus')">Receita (+)</button>
                <button type="button" id="type-minus" class="type-btn minus" onclick="setType('minus')">Despesa (-)</button>
            </div>
            <form id="f-form">
                <input type="text" id="d-desc" placeholder="Descrição" required>
                <input type="number" step="0.01" id="d-val" placeholder="Valor" required>
                <input type="date" id="d-date" required>
                <button type="submit" class="btn-save">Guardar Registro</button>
                <button type="button" onclick="toggleModal(false)" style="width:100%; background:none; border:none; margin-top:15px; color:#94a3b8; cursor:pointer">Cancelar</button>
            </form>
        </div>
    </div>

    <footer style="text-align: center; padding: 40px 20px; color: var(--cor-texto-secundario); border-top: 1px solid var(--cor-borda);">
    <p>&copy; 2024 Finanças Flow - Todos os direitos reservados</p>
    <a href="privacidade.html" style="color: var(--cor-primaria); text-decoration: none; font-size: 14px;">Política de Privacidade</a>
</footer>

    <script>
        let items = JSON.parse(localStorage.getItem('fin_vToggle')) || [];
        let currentFilter = new Date().toISOString().slice(0, 7);
        let selectedType = 'plus';
        let myChart = null;
        let privacyMode = localStorage.getItem('fin_privacy') === 'true';

        // --- TEMA ---
        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
            render();
        }
        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');

        // --- PRIVACIDADE ---
        function togglePrivacy() {
            privacyMode = !privacyMode;
            localStorage.setItem('fin_privacy', privacyMode);
            render();
        }

        // --- MODAL & DATA AUTOMÁTICA ---
        function toggleModal(s) { 
            if(s) {
                const dateInput = document.getElementById('d-date');
                const hojeFull = new Date().toISOString().slice(0, 10);
                const hojeMes = new Date().toISOString().slice(0, 7);

                if (currentFilter === hojeMes) {
                    dateInput.value = hojeFull;
                } else {
                    dateInput.value = currentFilter + "-01";
                }
                setType('plus');
            }
            document.getElementById('modal').className = s ? 'modal open' : 'modal'; 
        }

        function setType(type) {
            selectedType = type;
            document.getElementById('type-plus').classList.toggle('active', type === 'plus');
            document.getElementById('type-minus').classList.toggle('active', type === 'minus');
        }

        // --- DADOS ---
        function deleteItem(id) { 
            if(confirm("Deseja excluir este registro?")) {
                items = items.filter(i => i.id !== id); 
                save(); 
            }
        }

        function save() {
            localStorage.setItem('fin_vToggle', JSON.stringify(items));
            render();
        }

        function importJSON(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) {
                        if(confirm(`Restaurar ${data.length} itens? Isso apagará os dados atuais.`)) {
                            items = data;
                            save();
                        }
                    }
                } catch (err) { alert("Arquivo JSON inválido."); }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // --- GRÁFICO ---
        function updateChart(ganhos, gastos) {
            const canvas = document.getElementById('financeChart');
            if(!canvas || !window.Chart) return;
            const ctx = canvas.getContext('2d');
            if (myChart) myChart.destroy();
            
            const isDark = document.body.classList.contains('dark');

            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Ganhos', 'Gastos'],
                    datasets: [{
                        data: [ganhos || 1, gastos || 0],
                        backgroundColor: ['#10b981', '#f43f5e'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: isDark ? '#f1f5f9' : '#334155', font: { weight: '600' } }
                        }
                    }
                }
            });
        }

        // --- RENDERIZAÇÃO ---
        function render() {
            const list = document.getElementById('transaction-list');
            const chips = document.getElementById('month-chips');
            const labelDate = document.getElementById('label-date');
            list.innerHTML = ''; chips.innerHTML = '';

            // --- AQUI ESTÃO TODOS OS MESES (3 Anos Completos) ---
            const anoAtual = new Date().getFullYear();
            
            for(let y = anoAtual - 1; y <= anoAtual + 1; y++) {
                for(let m = 1; m <= 12; m++) {
                    let mesStr = m.toString().padStart(2, '0');
                    let mVal = `${y}-${mesStr}`;
                    let isActive = mVal === currentFilter;
                    
                    let chip = document.createElement('div');
                    chip.className = `chip ${isActive ? 'active' : ''}`;
                    
                    // Ajuste de data seguro
                    let d = new Date(y, m - 1, 15);
                    let chipText = d.toLocaleDateString('pt-BR', {month:'short'}).toUpperCase();
                    
                    // Coloca o ano do lado se não for o ano atual (ex: JAN 25)
                    if(y !== anoAtual) chipText += ` ${y.toString().slice(-2)}`;
                    
                    chip.innerText = chipText;
                    chip.onclick = () => { currentFilter = mVal; render(); };
                    chips.appendChild(chip);
                    
                    if(isActive) labelDate.innerText = d.toLocaleDateString('pt-BR', {month:'long', year:'numeric'}).toUpperCase();
                }
            }

            // Centraliza o mês ativo automaticamente na tela
            setTimeout(() => {
                const activeChip = chips.querySelector('.active');
                if (activeChip) activeChip.scrollIntoView({ behavior: 'auto', inline: 'center', block: 'nearest' });
            }, 0);
            // ---------------------------------------------------

            const filtered = items.filter(it => it.date.startsWith(currentFilter));
            let fIn = 0, fOut = 0;

            filtered.forEach(it => {
                const valAbs = Math.abs(it.val);
                if(it.val > 0) fIn += valAbs; else fOut += valAbs;
                
                let div = document.createElement('div');
                div.className = 'item';
                
                const valorFormatado = valAbs.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
                const blurClass = privacyMode ? 'blur-text' : '';

                div.innerHTML = `
                    <div><strong>${it.desc}</strong><br><small style="color:#94a3b8">${it.date.split('-').reverse().slice(0,2).join('/')}</small></div>
                    <div style="text-align:right">
                        <span class="${blurClass}" style="color:${it.val > 0 ? 'var(--green)' : 'var(--red)'}; font-weight:bold">
                            ${it.val > 0 ? '+':'-'}${valorFormatado}
                        </span><br>
                        <button class="btn-del" onclick="deleteItem(${it.id})">Apagar</button>
                    </div>`;
                list.appendChild(div);
            });

            // Atualização de Saldos e Interface
            const total = fIn - fOut;
            const eyeBtn = document.getElementById('eye-icon');
            const balanceEl = document.getElementById('balance');
            
            balanceEl.innerText = privacyMode ? "R$ •••••" : total.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
            document.getElementById('t-in').innerText = privacyMode ? "R$ •••" : fIn.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
            document.getElementById('t-out').innerText = privacyMode ? "R$ •••" : fOut.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
            
            eyeBtn.innerText = privacyMode ? "🙈" : "👁️";
            balanceEl.classList.toggle('blur-text', privacyMode);

            updateChart(fIn, fOut);
        }

        document.getElementById('f-form').onsubmit = (e) => {
            e.preventDefault();
            let rawVal = Math.abs(parseFloat(document.getElementById('d-val').value));
            items.push({
                id: Date.now(),
                desc: document.getElementById('d-desc').value,
                val: selectedType === 'minus' ? -rawVal : rawVal,
                date: document.getElementById('d-date').value
            });
            toggleModal(false); e.target.reset(); save();
        };

        function scrollMonths(val) { document.getElementById('month-chips').scrollBy({ left: val, behavior: 'smooth' }); }

        // Inicializar
        render();
    </script>
</body>
</html>
